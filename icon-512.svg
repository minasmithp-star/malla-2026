<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#f5f0e8"/>

  <g transform="translate(0,-8)">
  <!-- Outer hex ring (decorative, faint) -->
  <polygon points="256,68 382,141 382,287 256,360 130,287 130,141"
    fill="none" stroke="#e0d8cc" stroke-width="3"/>

  <!-- Main hexagon filled -->
  <polygon points="256,96 366,158 366,282 256,344 146,282 146,158"
    fill="#c8dff5" stroke="#8fbde0" stroke-width="5"/>

  <!-- Inner hexagon outline -->
  <polygon points="256,138 334,184 334,276 256,322 178,276 178,184"
    fill="none" stroke="#7a9fc0" stroke-width="3" opacity="0.55"/>

  <!-- Molecule bonds from center -->
  <line x1="256" y1="224" x2="256" y2="96"  stroke="#7a9fc0" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="224" x2="366" y2="282" stroke="#7a9fc0" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="224" x2="146" y2="282" stroke="#7a9fc0" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="224" x2="256" y2="344" stroke="#7a9fc0" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <line x1="256" y1="224" x2="366" y2="158" stroke="#7a9fc0" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <line x1="256" y1="224" x2="146" y2="158" stroke="#7a9fc0" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

  <!-- Center dot -->
  <circle cx="256" cy="224" r="14" fill="#7a9fc0"/>
  <circle cx="256" cy="224" r="7"  fill="#f5f0e8"/>

  <!-- Atom dots — alternating green / blue -->
  <circle cx="256" cy="96"  r="11" fill="#90b890"/>
  <circle cx="366" cy="282" r="11" fill="#90b890"/>
  <circle cx="146" cy="282" r="11" fill="#90b890"/>
  <circle cx="256" cy="344" r="9"  fill="#7a9fc0" opacity="0.5"/>
  <circle cx="366" cy="158" r="9"  fill="#7a9fc0" opacity="0.5"/>
  <circle cx="146" cy="158" r="9"  fill="#7a9fc0" opacity="0.5"/>

  <!-- Hex deco accent (small, bottom-right area) -->
  <polygon points="330,370 348,380 348,400 330,410 312,400 312,380"
    fill="#c8b880" opacity="0.5"/>

  <!-- QF text -->
  <text x="256" y="456" text-anchor="middle"
    font-family="Georgia, serif" font-size="68" font-weight="700"
    letter-spacing="8" fill="#2d2a24" opacity="0.72">QF</text>
  </g>
</svg>
